<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ponto - Ponto Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f1f5f9; color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; padding: 16px; }

        .app-container { max-width: 450px; width: 100%; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; padding: 24px; display: flex; flex-direction: column; gap: 24px; text-align: center; }
        
        /* TOPO COM LOGO E SAIR */
        .app-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px; }
        .app-header h2 { font-size: 1.15rem; font-weight: 700; color: #0f172a; }
        .btn-sair { background: #fee2e2; color: #ef4444; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }

        /* BOX DO RELÓGIO DIGITAL */
        .clock-box { background: #0f172a; color: #ffffff; padding: 24px; border-radius: 16px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .clock-box .date { font-size: 0.9rem; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .clock-box .time { font-size: 2.5rem; font-weight: 700; font-family: monospace; color: #f97316; }

        /* STATUS DA CERCA VIRTUAL */
        .status-gps { padding: 12px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; background-color: #fef3c7; color: #d97706; }
        
        /* GRADE DOS 4 BOTÕES DE PONTO */
        .ponto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-ponto { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 14px; padding: 20px 12px; font-size: 0.95rem; font-weight: 700; color: #334155; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-ponto span { font-size: 1.5rem; }
        .btn-ponto:hover { border-color: #f97316; background: #fff7ed; }
        
        /* Estilos para marcar pontos batidos */
        .btn-ponto.success { border-color: #10b981; background: #ecfdf5; color: #065f46; }

        /* ALERTA DE STATUS */
        .alerta { padding: 12px; border-radius: 10px; font-size: 0.9rem; font-weight: 500; display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h2>⏱️ Ponto Web Mobile</h2>
            <button id="btnSair" class="btn-sair">Sair</button>
        </header>

        <div class="clock-box">
            <div id="txtData" class="date">Carregando data...</div>
            <div id="txtRelogio" class="time">00:00:00</div>
        </div>

        <div id="statusGps" class="status-gps">
            <span>📍</span> Verificando sua localização...
        </div>

        <main class="ponto-grid">
            <button id="btnEntrada" class="btn-ponto"><span>📥</span>Entrada</button>
            <button id="btnAlmocoSai" class="btn-ponto"><span>☕</span>Saída Almoço</button>
            <button id="btnAlmocoVolta" class="btn-ponto"><span>🍽️</span>Volta Almoço</button>
            <button id="btnSaida" class="btn-ponto"><span>📤</span>Saída Final</button>
        </main>

        <div id="msgApp" class="alerta"></div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, getDoc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. RELÓGIO DIGITAL ATUALIZADO EM TEMPO REAL
        function atualizarRelogio() {
            const agora = new Date();
            
            // Formatando a data por extenso em português
            const opcoesData = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtData').textContent = agora.toLocaleDateString('pt-BR', opcoesData);
            
            // Formatando o relógio com dois dígitos
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            const segundos = String(agora.getSeconds()).padStart(2, '0');
            document.getElementById('txtRelogio').textContent = `${horas}:${minutos}:${segundos}`;
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // 2. LOGOUT DO SISTEMA
        const btnSair = document.getElementById('btnSair');
        if (btnSair) {
            btnSair.onclick = async function(e) {
                e.preventDefault();
                try {
                    await signOut(auth);
                    window.location.href = 'index.html';
                } catch(err) { console.error(err); }
            };
        }

        // Os próximos passos serão incluir as regras da cerca virtual e gravação dos pontos!
    </script>
</body>
</html>
