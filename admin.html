<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ponto Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; color: #1e293b; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

        /* Card de Login Premium baseado no seu anexo */
        .login-card { max-width: 380px; width: 100%; background: #ffffff; border-radius: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); padding: 40px 32px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        /* Ícone Quadrado Laranja */
        .brand-icon { background-color: #f97316; color: white; width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 20px; }

        /* Textos */
        .login-card h2 { font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .login-card p { font-size: 0.88rem; color: #94a3b8; margin-bottom: 28px; font-weight: 500; }

        /* Formulário e Inputs do Anexo */
        .form-login { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .input-field { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; outline: none; background-color: #ffffff; color: #334155; }
        .input-field::placeholder { color: #cbd5e1; }
        .input-field:focus { border-color: #f97316; }
        
        /* Botão Escuro */
        .btn-entrar { background-color: #0f172a; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.95rem; }
        .btn-entrar:hover { background-color: #1e293b; }

        /* Link de Esqueci a Senha */
        .link-esqueci { margin-top: 24px; font-size: 0.88rem; color: #f97316; font-weight: 600; cursor: pointer; }
        .link-esqueci:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-icon">⏱️</div>
        <h2>Ponto Web</h2>
        <p>Acesso ao Painel e Registros</p>

        <form id="loginForm" class="form-login">
            <input type="email" id="email" class="input-field" required placeholder="Seu e-mail">
            <input type="password" id="senha" class="input-field" required placeholder="Sua senha">
            <button type="submit" class="btn-entrar">Entrar no Sistema</button>
        </form>

        <div class="link-esqueci" id="btnEsqueci">Esqueci minha senha</div>
    </div>

    <script type="module">
        // Lógica limpa e direta para evitar travamentos de build
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if(email.includes("admin")) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "colaborador.html";
            }
        };
    </script>
</body>
</html>
