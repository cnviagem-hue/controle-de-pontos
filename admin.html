<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor - Controle de Ponto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn-icons-png.flaticon.com/512/2088/2088617.png" alt="Logo">
            <h2>Ponto Web</h2>
        </div>
        <ul class="sidebar-menu">
            <li id="li-cadastro" class="active"><a href="#" id="menu-cadastro">👥 Cadastro de Pessoal</a></li>
            <li id="li-relatorios"><a href="#" id="menu-relatorios">📊 Relatórios</a></li>
            <li id="li-config"><a href="#" id="menu-config">⚙️ Configurações</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1 id="titulo-pagina">Gestão de Pessoas e Acessos</h1>
            <button id="btnSair" class="btn-sair">Sair da Conta ➔</button>
        </header>

        <div class="content-area">
            
            <div id="sec-cadastro" class="card">
                <div class="card-header">
                    <h3>+ Novo Usuário</h3>
                </div>
                <form id="cadastroForm" class="card-body">
                    <div class="form-grid">
                        <div class="input-group full-width">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" required placeholder="Ex: João da Silva">
                        </div>
                        <div class="input-group">
                            <label for="emailNovo">E-mail de Acesso</label>
                            <input type="email" id="emailNovo" required placeholder="joao@empresa.com">
                        </div>
                        <div class="input-group">
                            <label for="senhaNova">Senha Inicial</label>
                            <input type="password" id="senhaNova" required placeholder="Mínimo 6 caracteres">
                        </div>
                        <div class="input-group full-width">
                            <label for="tipoAcesso">Tipo de Acesso</label>
                            <select id="tipoAcesso" style="padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; width: 100%;">
                                <option value="colaborador">Colaborador (App de Bater Ponto)</option>
                                <option value="admin">Gestor (Acesso Painel)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 20px;">Cadastrar Usuário</button>
                </form>
                <p id="msgCadastro" class="alerta"></p>
            </div>

            <div id="sec-relatorios" class="card" style="display: none;">
                <div class="card-header">
                    <h3>Filtro de Registros</h3>
                </div>
                <div class="card-body">
                    <p style="color: #64748b; margin-bottom: 20px;">Selecione o período para gerar o relatório.</p>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Data Início</label>
                            <input type="date" id="dataInicio">
                        </div>
                        <div class="input-group">
                            <label>Data Fim</label>
                            <input type="date" id="dataFim">
                        </div>
                    </div>
                    <button id="btnGerarRelatorio" class="btn-primary" style="background-color: #10b981; margin-top: 20px;">Gerar e Baixar Excel</button>
                </div>
            </div>

            <div id="sec-config" class="card" style="display: none;">
                <div class="card-header">
                    <h3>Configuração Antifraude (Geolocalização)</h3>
                </div>
                <form id="configForm" class="card-body">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="latEmpresa">Latitude</label>
                            <input type="text" id="latEmpresa" required>
                        </div>
                        <div class="input-group">
                            <label for="lngEmpresa">Longitude</label>
                            <input type="text" id="lngEmpresa" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="background-color: #3b82f6; margin-top: 20px;">Salvar Configurações</button>
                </form>
            </div>

        </div>
    </main>

    <script type="module" src="js/admin.js?v=999"></script>
</body>
</html>
