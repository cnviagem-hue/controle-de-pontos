<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor - Controle de Ponto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn-icons-png.flaticon.com/512/2088/2088617.png" alt="Logo">
            <h2>Ponto Web</h2>
        </div>
        <ul class="sidebar-menu">
            <li class="active"><a href="#">👥 Cadastro de Pessoal</a></li>
            <li><a href="#">📊 Relatórios</a></li>
            <li><a href="#">⚙️ Configurações</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Gestão de Colaboradores</h1>
            <button id="btnSair" class="btn-sair">Sair da Conta ➔</button>
        </header>

        <div class="content-area">
            <div class="card">
                <div class="card-header">
                    <h3>+ Novo Colaborador</h3>
                </div>
                
                <form id="cadastroForm" class="card-body">
                    <div class="form-grid">
                        <div class="input-group full-width">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" required placeholder="Ex: João da Silva">
                        </div>

                        <div class="input-group">
                            <label for="emailNovo">E-mail de Acesso</label>
                            <input type="email" id="emailNovo" required placeholder="joao@empresa.com">
                        </div>

                        <div class="input-group">
                            <label for="senhaNova">Senha Inicial</label>
                            <input type="password" id="senhaNova" required placeholder="Mínimo 6 caracteres">
                        </div>
                        
                        <div class="input-group full-width divider">
                            <h4>Carga Horária Diária (Horas)</h4>
                        </div>

                        <div class="input-group">
                            <label for="horasSegSex">Segunda a Sexta</label>
                            <input type="number" id="horasSegSex" min="0" max="24" value="8" required>
                        </div>

                        <div class="input-group">
                            <label for="horasSab">Sábado</label>
                            <input type="number" id="horasSab" min="0" max="24" value="4" required>
                        </div>

                        <div class="input-group">
                            <label for="horasDom">Domingo</label>
                            <input type="number" id="horasDom" min="0" max="24" value="0" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Cadastrar Colaborador</button>
                </form>
                <p id="msgCadastro" class="alerta"></p>
            </div>
        </div>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
