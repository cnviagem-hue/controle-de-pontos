<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Colaborador - Ponto Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        
        .card-ponto { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 25px rgba(15, 23, 42, 0.06); padding: 32px; border: 1px solid #e2e8f0; width: 100%; max-width: 450px; }
        .brand-title { font-size: 1.5rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 24px; }
        .sub-title { font-size: 0.9rem; color: #64748b; text-align: center; margin-top: -16px; margin-bottom: 32px; }
        
        /* Telas separadas por IDs para controle de fluxo dinâmico */
        .tela-secao { display: none; }
        .tela-secao.active { display: block; }
        
        .btn-principal { background-color: #f97316; color: white; border: none; font-weight: 600; transition: background 0.2s; }
        .btn-principal:hover { background-color: #ea580c; color: white; }
        .btn-ponto { background-color: #10b981; color: white; border: none; font-weight: 700; padding: 16px; font-size: 1.1rem; border-radius: 12px; width: 100%; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-ponto:hover { background-color: #059669; }
        
        .log-registro { background-color: #f8fafc; border-left: 4px solid #3b82f6; padding: 12px; border-radius: 4px; margin-top: 12px; font-size: 0.85rem; color: #334155; }
    </style>
</head>
<body>

    <div class="card-ponto">
        <div class="brand-title" id="nomeEmpresaColab">UniCesumar</div>
        <div class="sub-title">Controle de Ponto Digital</div>

        <div id="secao-login" class="tela-secao active">
            <form id="formLoginColab" onsubmit="executarLoginColaborador(event)">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label small fw-medium text-secondary">E-mail Cadastrado</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="seuemail@empresa.com" required>
                </div>
                <div class="mb-4">
                    <label for="loginSenha" class="form-label small fw-medium text-secondary">Sua Senha</label>
                    <input type="password" id="loginSenha" class="form-control" placeholder="******" required>
                </div>
                <button type="submit" class="btn btn-principal w-100 py-2.5 rounded-3">Entrar no Sistema</button>
            </form>
        </div>

        <div id="secao-horarios" class="tela-secao">
            <div class="text-center mb-4">
                <span class="badge bg-light text-dark border px-3 py-2 fs-6 fw-semibold mb-2" id="relogioDigital">00:00:00</span>
                <p class="text-muted small mb-0" id="dataAtualStr">Carregando calendário...</p>
                <p class="small mt-2 fw-medium text-primary">Olá, <span id="nomeFuncionarioConectado">Funcionário</span>!</p>
            </div>

            <button type="button" class="btn btn-ponto mb-4" onclick="tentarRegistrarPonto()">
                ⏱️ REGISTRAR PONTO AGORA
            </button>

            <div class="fw-bold small text-secondary uppercase mb-2">Histórico de Hoje:</div>
            <div id="listaRegistrosHoje">
                <div class="text-muted small text-center py-3" id="txtSemPontos">Nenhum ponto batido hoje.</div>
            </div>

            <button type="button" class="btn btn-link btn-sm w-100 text-danger mt-4 text-decoration-none fw-medium" onclick="executarLogoutColaborador()">
                ↩️ Sair / Trocar de Conta
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalFeedbackColab" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
        <div class="modal-content border-0 shadow-lg" style="border-radius:16px;">
          <div class="modal-header bg-dark text-white py-3" style="border-top-left-radius:16px; border-top-right-radius:16px;">
            <h5 class="modal-title d-flex align-items-center gap-2" id="modalColabTitulo">🔔 Aviso</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 text-center">
            <p id="modalColabMensagem" class="fs-6 text-secondary mb-0"></p>
          </div>
          <div class="modal-footer border-0 pt-0 d-flex justify-content-center">
            <button type="button" class="btn btn-primary px-4 btn-sm" data-bs-dismiss="modal">OK</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="colaborador.js"></script>
</body>
</html>
