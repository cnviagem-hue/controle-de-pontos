<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Colaborador - Ponto Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
        
        .container-colab { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); width: 100%; max-width: 480px; padding: 28px; border: 1px solid #e2e8f0; }
        
        .app-title { font-size: 1.4rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .app-title span { color: #f97316; }

        .secao-app { display: none; }
        .secao-app.active { display: block; }

        /* RELÓGIO DIGITAL */
        .relogio-container { text-align: center; background: #0f172a; color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .relogio-hora { font-size: 2.25rem; font-weight: 700; font-family: monospace; letter-spacing: 2px; color: #f97316; }
        .relogio-data { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; text-transform: capitalize; }

        /* QUADROS DE REGISTRO DE PONTO (GRID TOPO) */
        .grid-ponto-botoes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .card-ponto-click { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .card-ponto-click:hover { border-color: #f97316; background-color: #fff7ed; transform: translateY(-2px); }
        .card-ponto-click .icon { font-size: 1.4rem; }
        .card-ponto-click .label { font-size: 0.85rem; font-weight: 600; color: #334155; }

        /* HISTÓRICO DE HOJE */
        .historico-container { background: #f8fafc; border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; max-height: 220px; overflow-y: auto; }
        .historico-titulo { font-size: 0.85rem; font-weight: 700; color: #475569; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
        
        .log-registro { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.85rem; color: #334155; }
        .log-registro:last-child { border-bottom: none; }
        .log-registro .tipo { font-weight: 600; color: #0f172a; }
        .log-registro .data-log { font-size: 0.8rem; color: #64748b; margin-left: auto; padding-right: 12px; }
        .log-registro .hora { font-family: monospace; font-weight: 700; color: #16a34a; }

        .btn-logout { background: none; border: none; color: #94a3b8; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 4px; cursor: pointer; transition: color 0.2s; margin: 16px auto 0 auto; }
        .btn-logout:hover { color: #ef4444; }
    </style>
</head>
<body>

    <div class="container-colab">
        <div class="app-title">⏱️ Ponto<span>Web</span></div>

        <div id="secao-login" class="secao-app active">
            <form id="formLoginColab" onsubmit="executarLoginColaborador(event)">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">E-mail Corporativo</label>
                    <input type="email" id="loginEmail" placeholder="Ex: nome@empresa.com" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Senha de Acesso</label>
                    <input type="password" id="loginSenha" placeholder="Digite sua senha" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold">Entrar na Área de Trabalho</button>
            </form>
        </div>

        <div id="secao-horarios" class="secao-app">
            
            <div class="relogio-container">
                <div id="relogioDigital" class="relogio-hora">00:00:00</div>
                <div id="dataAtualStr" class="relogio-data">Carregando calendário...</div>
            </div>

            <div id="nomeFuncionarioConectado" class="mb-4"></div>

            <div class="grid-ponto-botoes">
                <div class="card-ponto-click" onclick="solicitarMarcacaoPonto('Entrada')">
                    <span class="icon">🌅</span>
                    <span class="label">Entrada</span>
                </div>
                <div class="card-ponto-click" onclick="solicitarMarcacaoPonto('Almoço Ida')">
                    <span class="icon">🍽️</span>
                    <span class="label">Almoço Ida</span>
                </div>
                <div class="card-ponto-click" onclick="solicitarMarcacaoPonto('Almoço Volta')">
                    <span class="icon">💼</span>
                    <span class="label">Almoço Volta</span>
                </div>
                <div class="card-ponto-click" onclick="solicitarMarcacaoPonto('Saída')">
                    <span class="icon">🌌</span>
                    <span class="label">Saída</span>
                </div>
            </div>

            <div class="historico-container">
                <div class="historico-titulo">Registros Realizados Hoje</div>
                <div id="listaRegistrosHoje">
                    <div id="txtSemPontos" class="text-center text-muted small py-2">Nenhum ponto registrado hoje.</div>
                </div>
            </div>

            <button type="button" class="btn-logout" onclick="executarLogoutColaborador()">
                ➔ Sair da Conta
            </button>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmarPonto" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg" style="border-radius:16px;">
          <div class="modal-body p-4 text-center">
            <div class="fs-1 mb-2">📌</div>
            <h5 class="fw-bold text-dark mb-2">Confirmar Registro?</h5>
            <p class="small text-secondary mb-4">Você deseja registrar seu ponto de <strong id="txtTipoPontoConfirmar" class="text-primary"></strong> agora?</p>
            
            <div class="d-flex gap-2 justify-content-center">
                <button type="button" class="btn btn-light btn-sm px-3 fw-semibold" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary btn-sm px-4 fw-bold" onclick="confirmarEGravarPonto()">Confirmar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalFeedbackColab" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius:16px;">
          <div class="modal-header bg-dark text-white py-2.5" style="border-top-left-radius:16px; border-top-right-radius:16px;">
            <h6 class="modal-title" id="modalColabTitulo">🔔 Aviso</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 text-center">
            <p id="modalColabMensagem" class="small text-secondary mb-0"></p>
          </div>
          <div class="modal-footer border-0 pt-0 d-flex justify-content-center">
            <button type="button" class="btn btn-primary btn-sm px-4" data-bs-dismiss="modal">Entendido</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="colaborador.js"></script>
</body>
</html>
