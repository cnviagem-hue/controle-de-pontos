<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Web - Bater Ponto</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f8fafc; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 16px;
        }

        .card-custom {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 32px 24px;
            border: 1px solid #e2e8f0;
            width: 100%;
            position: relative;
        }

        .logo-area { text-align: center; margin-bottom: 24px; }
        .logo-area h2 { font-size: 2rem; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .logo-area span { color: #f97316; }

        /* SEÇÕES */
        #secao-login, #secao-horarios { display: none; }
        #secao-login.active, #secao-horarios.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGIN */
        .form-control {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #334155;
        }
        .form-control:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        
        .password-container { position: relative; display: flex; align-items: center; width: 100%; }
        .password-container input { padding-right: 44px; width: 100%; }
        .btn-toggle-eye { position: absolute; right: 12px; background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #94a3b8; padding: 0; }

        .btn-principal {
            background-color: #f97316;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-principal:hover { background-color: #ea580c; color: white; }

        /* RELÓGIO E HORÁRIOS */
        .relogio-box {
            background-color: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.2);
        }
        #relogioDigital { font-size: 2.5rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 2px; margin-bottom: 4px; color: #f97316; }
        #dataAtualStr { font-size: 0.9rem; font-weight: 500; color: #cbd5e1; text-transform: capitalize; }

        .btn-ponto {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 12px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-entrada { background-color: #10b981; color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        .btn-entrada:hover { background-color: #059669; color: white; }
        
        .btn-pausa { background-color: #f59e0b; color: white; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2); }
        .btn-pausa:hover { background-color: #d97706; color: white; }
        
        .btn-saida { background-color: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }
        .btn-saida:hover { background-color: #dc2626; color: white; }

        .historico-box { background-color: #f1f5f9; border-radius: 8px; padding: 16px; margin-top: 24px; }
        .historico-titulo { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid #cbd5e1; padding-bottom: 8px; }
        
        .log-registro { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; }
        .log-registro .tipo { font-weight: 700; color: #334155; }
        .log-registro .data-log { color: #94a3b8; font-size: 0.8rem; }
        .log-registro .hora { font-weight: 700; color: #0f172a; }

        .btn-logout { background: none; border: none; color: #ef4444; font-weight: 600; font-size: 0.9rem; width: 100%; padding: 12px; margin-top: 16px; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- SEÇÃO 1: LOGIN -->
        <div id="secao-login" class="card-custom active">
            <div class="logo-area">
                <h2>Ponto<span>Web</span></h2>
                <p class="text-muted small fw-medium">Portal do Colaborador</p>
            </div>

            <form id="formLoginColab" onsubmit="executarLoginColaborador(event)">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-dark mb-1">E-mail de Acesso</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="seu.email@empresa.com" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold small text-dark mb-1">Senha</label>
                    <div class="password-container">
                        <input type="password" id="loginSenha" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="btn-toggle-eye" onclick="toggleSenhaLogin('loginSenha', this)">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-principal">Entrar no Sistema</button>
            </form>

            <!-- AQUI ESTÁ O LINK DISCRETO PARA O PAINEL DE ADMINISTRAÇÃO -->
            <div class="text-center mt-4 pt-3 border-top">
                <a href="login-admin.html" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s;">
                    🔒 Acesso Restrito à Gestão
                </a>
            </div>
        </div>

        <!-- SEÇÃO 2: BATER PONTO (Bate-Ponto Virtual) -->
        <div id="secao-horarios" class="card-custom">
            
            <div class="relogio-box">
                <div id="relogioDigital">00:00:00</div>
                <div id="dataAtualStr">Carregando data...</div>
            </div>

            <div id="nomeFuncionarioConectado" class="mb-4 border-bottom pb-3">
                <!-- Injetado pelo JS -->
            </div>

            <div class="d-flex flex-column gap-2">
                <button type="button" class="btn-ponto btn-entrada" onclick="solicitarMarcacaoPonto('Entrada')">
                    🟢 Bater Ponto - Entrada
                </button>
                <button type="button" class="btn-ponto btn-pausa" onclick="solicitarMarcacaoPonto('Almoço Ida')">
                    ⏸️ Início do Almoço
                </button>
                <button type="button" class="btn-ponto btn-pausa" onclick="solicitarMarcacaoPonto('Almoço Volta')">
                    ▶️ Volta do Almoço
                </button>
                <button type="button" class="btn-ponto btn-saida" onclick="solicitarMarcacaoPonto('Saída')">
                    🔴 Bater Ponto - Saída
                </button>
            </div>

            <div class="historico-box">
                <div class="historico-titulo">⏱️ Seus Registros de Hoje</div>
                <div id="listaRegistrosHoje">
                    <!-- Injetado pelo JS -->
                </div>
            </div>

            <button type="button" class="btn-logout" onclick="executarLogoutColaborador()">Sair da minha conta</button>
        </div>

    </div>

    <!-- MODAL DE FEEDBACK / AVISOS -->
    <div class="modal fade" id="modalFeedbackColab" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow" style="border-radius:16px;">
          <div class="modal-header bg-dark text-white py-3" style="border-top-left-radius:16px; border-top-right-radius:16px;">
            <h5 class="modal-title fs-6 fw-bold" id="modalColabTitulo">Aviso</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 text-center text-secondary fw-medium" id="modalColabMensagem">
            <!-- Mensagem -->
          </div>
          <div class="modal-footer border-0 pt-0 d-flex justify-content-center">
            <button type="button" class="btn btn-primary px-4 btn-sm fw-bold" data-bs-dismiss="modal">Entendido</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO DE PONTO E GPS -->
    <div class="modal fade" id="modalConfirmarPonto" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow" style="border-radius:16px;">
          <div class="modal-header bg-primary text-white py-3" style="border-top-left-radius:16px; border-top-right-radius:16px;">
            <h5 class="modal-title fs-6 fw-bold">📍 Confirmação de Ponto</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4 text-center">
            <p class="mb-2 text-secondary fw-medium">Confirma a marcação de:</p>
            <h4 class="fw-bold text-dark mb-3" id="txtTipoPontoConfirmar">Tipo</h4>
            <p class="small text-muted mb-0">O sistema capturará sua localização exata (GPS) para validar este registro antifraude.</p>
          </div>
          <div class="modal-footer border-0 pt-0 d-flex justify-content-center gap-2">
            <button type="button" class="btn btn-light border btn-sm fw-medium" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-success btn-sm px-3 fw-bold" onclick="confirmarEGravarPonto()">Sim, Gravar Ponto</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts Bootstrap e Colaborador -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="colaborador.js"></script>
</body>
</html>
