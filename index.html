<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Ponto</title>
</head>
<body>
    <div class="login-container">
        <h2>Controle de Ponto</h2>
        <form id="loginForm">
            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="Digite seu e-mail">

            <label for="senha">Senha</label>
            <input type="password" id="senha" required placeholder="Digite sua senha">

            <button type="submit">Entrar</button>
        </form>
        <p id="mensagemErro" style="color: red; display: none;">Login ou senha inválidos.</p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
