<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - Ponto Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        body::before {
            content: ""; position: absolute; top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%; z-index: 0;
        }
        body::after {
            content: ""; position: absolute; bottom: -10%; right: -5%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%; z-index: 0;
        }

        .login-wrapper { width: 100%; max-width: 420px; padding: 20px; z-index: 1; }
        .login-card {
            background: #ffffff; border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); padding: 40px 32px; width: 100%; position: relative;
        }

        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-area h2 { font-size: 2rem; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .logo-area span { color: #f97316; }

        .form-control {
            background-color: #f8fafc; border: 1px solid #cbd5e1; padding: 12px 16px;
            border-radius: 8px; font-size: 0.95rem; color: #334155; transition: all 0.2s;
        }
        .form-control:focus {
            background-color: #ffffff; border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .password-container { position: relative; display: flex; align-items: center; }
        .password-container input { padding-right: 45px; }
        .btn-toggle-eye {
            position: absolute; right: 12px; background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #94a3b8; transition: color 0.2s; padding: 0; z-index: 5;
        }
        .btn-toggle-eye:hover { color: #f97316; }

        .btn-login {
            background-color: #f97316; color: #ffffff; border: none; padding: 14px;
            border-radius: 8px; font-weight: 700; font-size: 1rem; width: 100%; margin-top: 24px; transition: all 0.3s; box-shadow: 0 4px 6px rgba(249, 115, 22, 0.2);
        }
        .btn-login:hover {
            background-color: #ea580c; box-shadow: 0 6px 12px rgba(249, 115, 22, 0.3); transform: translateY(-1px);
        }

        .alert-error {
            display: none; background-color: #fef2f2; color: #ef4444; border: 1px solid #fca5a5;
            padding: 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 20px; animation: shake 0.4s ease-in-out;
        }

        .footer-text { text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 24px; font-weight: 500; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <h2>Ponto<span>Web</span></h2>
                <p class="text-muted small fw-medium">Acesso Restrito à Gestão</p>
            </div>

            <div id="msgErro" class="alert-error">
                ⚠️ E-mail ou senha incorretos!
            </div>

            <form id="formLoginAdmin" onsubmit="entrarNoPainel(event)">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-dark mb-1">E-mail Administrativo</label>
                    <input type="email" id="emailAdmin" class="form-control" placeholder="gestor@empresa.com" required>
                </div>
                
                <div class="mb-2">
                    <label class="form-label fw-bold small text-dark mb-1">Senha de Acesso</label>
                    <div class="password-container">
                        <input type="password" id="senhaAdmin" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="btn-toggle-eye" onclick="alternarVisibilidadeSenha('senhaAdmin', this)">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login">Acessar Painel</button>
            </form>

            <div class="footer-text">
                Sistema protegido e encriptado.
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTrocarSenha" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg" style="border-radius:12px;">
          <div class="modal-header bg-warning text-dark py-3">
            <h5 class="modal-title fs-6 fw-bold">🔒 Troca de Senha Obrigatória</h5>
          </div>
          <div class="modal-body p-4 text-center">
            <p class="mb-3 text-secondary small fw-medium">Este é o seu primeiro acesso. Para garantir a segurança da sua empresa, por favor, cadastre uma nova senha.</p>
            
            <div class="mb-2 text-start">
                <label class="form-label fw-bold small text-dark mb-1">Nova Senha</label>
                <div class="password-container">
                    <input type="password" id="novaSenha" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    <button type="button" class="btn-toggle-eye" onclick="alternarVisibilidadeSenha('novaSenha', this)">👁️</button>
                </div>
            </div>
          </div>
          <div class="modal-footer border-0 pt-0 d-flex justify-content-center">
            <button type="button" class="btn btn-primary w-100 fw-bold" onclick="salvarNovaSenha()">Salvar e Acessar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let empresaLogandoIndex = null;

        function alternarVisibilidadeSenha(idInput, botao) {
            const input = document.getElementById(idInput);
            if (input.type === "password") {
                input.type = "text";
                botao.innerText = "🙈";
            } else {
                input.type = "password";
                botao.innerText = "👁️";
            }
        }

        function entrarNoPainel(event) {
            event.preventDefault();
            
            const email = document.getElementById("emailAdmin").value.trim().toLowerCase();
            const senha = document.getElementById("senhaAdmin").value.trim();
            const erro = document.getElementById("msgErro");

            const bancoEmpresas = JSON.parse(localStorage.getItem("banco_empresas_web")) || [];
            const indexEmpresa = bancoEmpresas.findIndex(e => e.email === email && e.senhaAtual === senha && e.status === "ATIVO");

            if (indexEmpresa !== -1) {
                erro.style.display = "none";
                const empresa = bancoEmpresas[indexEmpresa];

                if (empresa.primeiroAcesso === true || senha === "mudar123") {
                    empresaLogandoIndex = indexEmpresa;
                    new bootstrap.Modal(document.getElementById('modalTrocarSenha')).show();
                } else {
                    sessionStorage.setItem("admin_autenticado", "true");
                    sessionStorage.setItem("nome_empresa_ativa", empresa.nome); 
                    sessionStorage.setItem("email_empresa_ativa", empresa.email); // ETIQUETA DA GAVETA
                    window.location.href = "admin.html";
                }
            } else {
                erro.style.display = "block";
                document.getElementById("senhaAdmin").value = "";
                document.getElementById("senhaAdmin").focus();
            }
        }

        function salvarNovaSenha() {
            const novaSenhaInput = document.getElementById("novaSenha").value.trim();
            if (novaSenhaInput.length < 6) {
                alert("Sua senha precisa ter no mínimo 6 caracteres.");
                return;
            }

            let bancoEmpresas = JSON.parse(localStorage.getItem("banco_empresas_web")) || [];
            bancoEmpresas[empresaLogandoIndex].senhaAtual = novaSenhaInput;
            bancoEmpresas[empresaLogandoIndex].primeiroAcesso = false;
            localStorage.setItem("banco_empresas_web", JSON.stringify(bancoEmpresas));

            const modalEl = document.getElementById('modalTrocarSenha');
            const modalInstance = bootstrap.Modal.getInstance(modalEl);
            modalInstance.hide();
            
            sessionStorage.setItem("admin_autenticado", "true");
            sessionStorage.setItem("nome_empresa_ativa", bancoEmpresas[empresaLogandoIndex].nome); 
            sessionStorage.setItem("email_empresa_ativa", bancoEmpresas[empresaLogandoIndex].email); // ETIQUETA DA GAVETA
            
            setTimeout(() => {
                window.location.href = "admin.html";
            }, 300);
        }
    </script>
</body>
</html>
