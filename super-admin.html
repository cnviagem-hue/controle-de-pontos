<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Plataforma - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background-color: #111827;
            min-height: 100vh;
            padding: 20px;
            border-right: 1px solid #1f2937;
        }
        .sidebar h2 {
            color: #10b981;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .sidebar p {
            color: #4b5563;
            font-size: 11px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .nav-link-custom {
            background: linear-gradient(135deg, #374151, #1f2937);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid #4b5563;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .logout-link {
            color: #9ca3af;
            text-decoration: none;
            display: block;
            margin-top: 30px;
            font-size: 14px;
            font-weight: 500;
        }
        .logout-link:hover {
            color: #ef4444;
        }
        .main-content {
            padding: 40px;
        }
        .header-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge-sync {
            background-color: #10b981;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 20px;
        }
        .card-panel {
            background-color: #111827;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #1f2937;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group-custom {
            margin-bottom: 15px;
        }
        .form-group-custom label {
            color: #10b981;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .form-control-custom {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 6px;
            width: 100%;
            font-size: 14px;
        }
        .form-control-custom:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            outline: none;
        }
        .btn-submit-custom {
            background-color: #10b981;
            color: #ffffff;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            transition: background 0.2s;
        }
        .btn-submit-custom:hover {
            background-color: #059669;
        }
        .table-custom {
            width: 100%;
            color: #e5e7eb;
        }
        .table-custom th {
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid #1f2937;
        }
        .table-custom td {
            padding: 14px 12px;
            border-bottom: 1px solid #1f2937;
            vertical-align: middle;
            font-size: 14px;
        }
        .badge-status {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-status.bloqueado {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .btn-tbl {
            font-size: 13px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 4px;
            border: none;
            transition: opacity 0.2s;
        }
        .btn-tbl:hover { opacity: 0.9; }
        .btn-tbl-block { background-color: #ffffff; color: #111827; }
        .btn-tbl-link { background-color: #2563eb; color: #ffffff; margin-left: 5px; }
        .btn-tbl-delete { background-color: #dc2626; color: #ffffff; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <h2>PontoWeb</h2>
            <p>Master Control</p>
            <a href="#" class="nav-link-custom">🏢 Empresas Clientes</a>
            <a href="#" onclick="efetuarLogoutMaster()" class="logout-link">◀ Sair do Sistema</a>
        </div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="header-title">
                <span>Gestão de Empresas Parceiras</span>
                <span class="badge-sync">Nuvem Sincronizada</span>
            </div>

            <div class="card-panel">
                <div class="card-title">➕ Registrar Empresa / Novo Administrador</div>
                <form id="formCadastroEmpresa" onsubmit="cadastrarNovaEmpresa(event)">
                    <div class="row">
                        <div class="col-md-3 form-group-custom">
                            <label>Nome Fantasia da Empresa</label>
                            <input type="text" id="empNome" class="form-control-custom" placeholder="Ex: Caldas Novas Viagens" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>CNPJ</label>
                            <input type="text" id="empCnpj" class="form-control-custom" placeholder="00.000.000/0000-00" maxlength="18" oninput="mascaraCNPJ(this)" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>E-mail do Administrador (RH)</label>
                            <input type="email" id="empEmail" class="form-control-custom" placeholder="rh@empresa.com" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>Senha Provisória de Acesso</label>
                            <input type="text" id="empSenha" class="form-control-custom" value="mudar123" required>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12 text-end">
                            <button type="submit" id="btnSalvarEmpresa" class="btn-submit-custom">Salvar Registro na Nuvem</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card-panel">
                <div class="card-title">📋 Contas Administrativas Ativas</div>
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>CNPJ</th>
                                <th>E-mail do Admin</th>
                                <th>Senha Atual</th>
                                <th>Status</th>
                                <th class="text-center">Ações de Controle</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEmpresasCorpo">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-3">⏳ Carregando base de dados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAlertaPersonalizado" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="background-color: #1f2937; border: 1px solid #374151; border-radius: 12px;">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center pt-0 pb-4 px-4">
         <p id="textoAlertaPersonalizado" class="text-white mb-4 mt-2" style="font-size: 15px; font-weight: 500;"></p>
         <button type="button" class="btn-submit-custom w-100" data-bs-dismiss="modal">Entendido</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAY8VH8f3SKpDvKdm0fzG-9X7gAm-yUEF4",
      authDomain: "ld-controle-de-ponto.firebaseapp.com",
      projectId: "ld-controle-de-ponto",
      storageBucket: "ld-controle-de-ponto.firebasestorage.app",
      messagingSenderId: "825252476177",
      appId: "1:825252476177:web:042610ab02abe5e964c8b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ==========================================
    // NOVA FUNÇÃO: MÁSCARA AUTOMÁTICA DE CNPJ
    // ==========================================
    function mascaraCNPJ(input) {
        let value = input.value.replace(/\D/g, ''); // Remove tudo o que não for número
        if (value.length > 14) value = value.slice(0, 14); // Trava em 14 dígitos reais
        
        // Aplica a formatação 00.000.000/0000-00
        value = value.replace(/^(\d{2})(\d)/, '$1.$2');
        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
        value = value.replace(/(\d{4})(\d)/, '$1-$2');
        
        input.value = value;
    }

    // Função auxiliar para exibir o pop-up customizado
    function mostrarAlerta(mensagem) {
        document.getElementById('textoAlertaPersonalizado').innerHTML = mensagem.replace(/\n/g, '<br>');
        new bootstrap.Modal(document.getElementById('modalAlertaPersonalizado')).show();
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!sessionStorage.getItem("super_admin_autenticado")) {
            window.location.href = "index.html";
            return;
        }
        carregarEmpresasDaNuvem();
    });

    async function carregarEmpresasDaNuvem() {
        const corpo = document.getElementById("tabelaEmpresasCorpo");
        try {
            const snapshot = await db.collection("empresas_clientes").get();
            corpo.innerHTML = "";

            if(snapshot.empty) {
                corpo.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">Nenhuma empresa registrada.</td></tr>`;
                return;
            }

            snapshot.forEach(doc => {
                const emp = doc.data();
                const statusClasse = emp.status === "ATIVO" ? "" : "bloqueado";
                const txtBotao = emp.status === "ATIVO" ? "Bloquear" : "Ativar";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="fw-bold text-white">${emp.nome}</td>
                    <td>${emp.cnpj}</td>
                    <td class="text-info">${emp.email}</td>
                    <td>
                        <input type="text" class="bg-dark text-white border-0 px-2 py-1 rounded text-center" style="width:110px; font-size:13px; font-family:monospace;" value="${emp.senhaAtual}" onchange="atualizarSenhaDireto('${doc.id}', this.value)">
                    </td>
                    <td><span class="badge-status ${statusClasse}">${emp.status}</span></td>
                    <td class="text-center">
                        <button class="btn-tbl btn-tbl-block" onclick="alternarStatusEmpresa('${doc.id}', '${emp.status}')">${txtBotao}</button>
                        <button class="btn-tbl btn-tbl-link" onclick="copiarLinkAcesso('${emp.email}')">🔗 Link</button>
                        <button class="btn-tbl btn-tbl-delete" onclick="excluirContaAdmin('${doc.id}')">Eliminar</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
            corpo.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Erro ao ler dados da nuvem.</td></tr>`;
        }
    }

    async function cadastrarNovaEmpresa(event) {
        event.preventDefault();
        const btn = document.getElementById("btnSalvarEmpresa");
        
        const nome = document.getElementById("empNome").value.trim();
        const cnpj = document.getElementById("empCnpj").value.trim();
        const email = document.getElementById("empEmail").value.trim().toLowerCase();
        const senha = document.getElementById("empSenha").value.trim();

        // Validação extra caso o usuário copie e cole um CNPJ incompleto
        if (cnpj.length < 18) {
            mostrarAlerta("❌ O CNPJ informado está incompleto. Digite os 14 números.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = "⏳ Gravando na Nuvem...";

        try {
            const checkEmail = await db.collection("empresas_clientes").where("email", "==", email).get();
            
            if (!checkEmail.empty) {
                mostrarAlerta("❌ Erro: Este e-mail de Administrador já está cadastrado!");
                btn.disabled = false;
                btn.innerHTML = "Salvar Registro na Nuvem";
                return;
            }

            const novaEmpresa = {
                nome: nome,
                cnpj: cnpj,
                email: email,
                senhaAtual: senha,
                status: "ATIVO",
                primeiroAcesso: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("empresas_clientes").add(novaEmpresa);
            
            const configCheck = await db.collection("configuracoes_empresa").where("empresaEmail", "==", email).get();
            if(configCheck.empty) {
                await db.collection("configuracoes_empresa").add({
                    empresaEmail: email,
                    nomeEmpresa: nome,
                    cep: "", numero: "", latitude: "", longitude: "", raio: "200", endereco: ""
                });
            }

            document.getElementById("formCadastroEmpresa").reset();
            document.getElementById("empSenha").value = "mudar123";
            
            mostrarAlerta("✅ Sucesso! Novo Administrador vinculado à empresa.");
            await carregarEmpresasDaNuvem();

        } catch (error) {
            mostrarAlerta("⚠️ Falha ao salvar no banco de dados.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Salvar Registro na Nuvem";
        }
    }

    async function atualizarSenhaDireto(id, novaSenha) {
        if(!novaSenha.trim()) return;
        try {
            await db.collection("empresas_clientes").doc(id).update({ senhaAtual: novaSenha.trim() });
            mostrarAlerta("🔑 Senha do Admin atualizada com sucesso!");
        } catch (error) {
            mostrarAlerta("❌ Erro ao atualizar senha.");
        }
    }

    // LINK 100% LIMPO E DIRETO COMO APROVADO
    function copiarLinkAcesso(emailAdmin) {
        const link = `https://ponto.ldsite.com.br/login-admin.html`;
        navigator.clipboard.writeText(link).then(() => {
            mostrarAlerta("🔗 Link de acesso copiado com sucesso!");
        }).catch(() => {
            mostrarAlerta("Erro ao copiar link. Tente manualmente: " + link);
        });
    }

    async function alternarStatusEmpresa(id, statusAtual) {
        const novoStatus = statusAtual === "ATIVO" ? "BLOQUEADO" : "ATIVO";
        try {
            await db.collection("empresas_clientes").doc(id).update({ status: novoStatus });
            await carregarEmpresasDaNuvem();
        } catch (error) {
            mostrarAlerta("❌ Erro ao mudar status.");
        }
    }

    async function excluirContaAdmin(id) {
        if(!confirm("Tem certeza que deseja remover esta conta permanentemente?")) return;
        try {
            await db.collection("empresas_clientes").doc(id).delete();
            await carregarEmpresasDaNuvem();
        } catch (error) {
            mostrarAlerta("❌ Erro ao remover conta.");
        }
    }

    function efetuarLogoutMaster() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
