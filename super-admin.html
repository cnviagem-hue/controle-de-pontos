<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Plataforma - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0f1d;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            background-color: #111827;
            min-height: 100vh;
            padding: 20px;
        }
        .sidebar h2 {
            color: #10b981;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sidebar p {
            color: #4b5563;
            font-size: 12px;
            margin-bottom: 30px;
        }
        .nav-link-custom {
            background-color: #374151;
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .logout-link {
            color: #4b5563;
            text-decoration: none;
            display: block;
            margin-top: 30px;
        }
        .main-content {
            padding: 40px;
        }
        .header-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge-sync {
            background-color: #10b981;
            color: #ffffff;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .card-panel {
            background-color: #111827;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #1f2937;
        }
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        .form-group-custom label {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }
        .form-control-custom {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
        }
        .form-control-custom:focus {
            background-color: #1f2937;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: none;
            outline: none;
        }
        .btn-submit-custom {
            background-color: #10b981;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            float: right;
        }
        .btn-submit-custom:hover {
            background-color: #059669;
        }
        .table-custom {
            width: 100%;
            margin-top: 10px;
        }
        .table-custom th {
            color: #6b7280;
            font-weight: normal;
            padding: 12px;
            border-bottom: 1px solid #1f2937;
        }
        .table-custom td {
            padding: 16px 12px;
            border-bottom: 1px solid #1f2937;
            vertical-align: middle;
        }
        .badge-status {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-status.bloqueado {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .btn-action-block {
            background-color: transparent;
            border: 1px solid #374151;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-action-delete {
            background-color: #ef4444;
            border: none;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-left: 10px;
        }
        .btn-link-copy {
            background-color: #3b82f6;
            border: none;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <h2>PontoWeb</h2>
            <p>Master Control</p>
            <a href="#" class="nav-link-custom">🏢 Empresas Clientes</a>
            <a href="#" onclick="efetuarLogoutMaster()" class="logout-link">◀ Sair do Sistema</a>
        </div>

        <div class="col-md-9 col-lg-10 main-content">
            <div class="header-title">
                <span>Gestão de Empresas Parceiras</span>
                <span class="badge-sync">Nuvem Sincronizada</span>
            </div>

            <div class="card-panel">
                <div class="card-title">➕ Registrar Empresa / Novo Administrador</div>
                <form id="formCadastroEmpresa" onsubmit="cadastrarNovaEmpresa(event)">
                    <div class="row">
                        <div class="col-md-3 form-group-custom">
                            <label>Nome Fantasia da Empresa</label>
                            <input type="text" id="empNome" class="form-control-custom" placeholder="Ex: Caldas Novas Viagens" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>CNPJ</label>
                            <input type="text" id="empCnpj" class="form-control-custom" placeholder="Apenas números ou com máscara" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>E-mail do Administrador (RH)</label>
                            <input type="email" id="empEmail" class="form-control-custom" placeholder="rh@empresa.com" required>
                        </div>
                        <div class="col-md-3 form-group-custom">
                            <label>Senha Provisória de Acesso</label>
                            <input type="text" id="empSenha" class="form-control-custom" value="mudar123" required>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <button type="submit" id="btnSalvarEmpresa" class="btn-submit-custom">Salvar Registro na Nuvem</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card-panel">
                <div class="card-title">📋 Contas Administrativas Ativas</div>
                <div class="table-responsive">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>CNPJ</th>
                                <th>E-mail do Admin</th>
                                <th>Senha Atual</th>
                                <th>Status</th>
                                <th class="text-center">Ações de Controle</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEmpresasCorpo">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-3">⏳ Carregando base de dados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAY8VH8f3SKpDvKdm0fzG-9X7gAm-yUEF4",
      authDomain: "ld-controle-de-ponto.firebaseapp.com",
      projectId: "ld-controle-de-ponto",
      storageBucket: "ld-controle-de-ponto.firebasestorage.app",
      messagingSenderId: "825252476177",
      appId: "1:825252476177:web:042610ab02abe5e964c8b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.addEventListener("DOMContentLoaded", () => {
        if (!sessionStorage.getItem("super_admin_autenticado")) {
            window.location.href = "index.html";
            return;
        }
        carregarEmpresasDaNuvem();
    });

    async function carregarEmpresasDaNuvem() {
        const corpo = document.getElementById("tabelaEmpresasCorpo");
        try {
            const snapshot = await db.collection("empresas_clientes").orderBy("timestamp", "desc").get();
            corpo.innerHTML = "";

            if(snapshot.empty) {
                corpo.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">Nenhuma empresa registrada.</td></tr>`;
                return;
            }

            snapshot.forEach(doc => {
                const emp = doc.data();
                const statusClasse = emp.status === "ATIVO" ? "" : "bloqueado";
                const txtBotao = emp.status === "ATIVO" ? "Bloquear" : "Ativar";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="fw-bold">${emp.nome}</td>
                    <td>${emp.cnpj}</td>
                    <td class="text-info">${emp.email}</td>
                    <td>
                        <input type="text" class="bg-dark text-white border-0 px-2 py-1 rounded small" style="width:100px;" value="${emp.senhaAtual}" onchange="atualizarSenhaDireto('${doc.id}', this.value)">
                    </td>
                    <td><span class="badge-status ${statusClasse}">${emp.status}</span></td>
                    <td class="text-center">
                        <button class="btn-action-block" onclick="alternarStatusEmpresa('${doc.id}', '${emp.status}')">${txtBotao}</button>
                        <button class="btn-link-copy" onclick="copiarLinkAcesso('${emp.email}')">🔗 Link</button>
                        <button class="btn-action-delete" onclick="excluirContaAdmin('${doc.id}')">Eliminar</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        } catch (error) {
            console.error(error);
            corpo.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Erro ao ler dados da nuvem.</td></tr>`;
        }
    }

    async function cadastrarNovaEmpresa(event) {
        event.preventDefault();
        const btn = document.getElementById("btnSalvarEmpresa");
        
        const nome = document.getElementById("empNome").value.trim();
        const cnpj = document.getElementById("empCnpj").value.trim();
        const email = document.getElementById("empEmail").value.trim().toLowerCase();
        const senha = document.getElementById("empSenha").value.trim();

        btn.disabled = true;
        btn.innerHTML = "⏳ Gravando na Nuvem...";

        try {
            // AJUSTE CRUCIAL: Agora valida pelo E-MAIL, permitindo repetir o CNPJ para novos admins!
            const checkEmail = await db.collection("empresas_clientes").where("email", "==", email).get();
            
            if (!checkEmail.empty) {
                alert("❌ Este e-mail de Administrador já está cadastrado!");
                btn.disabled = false;
                btn.innerHTML = "Salvar Registro na Nuvem";
                return;
            }

            const novaEmpresa = {
                nome: nome,
                cnpj: cnpj,
                email: email,
                senhaAtual: senha,
                status: "ATIVO",
                primeiroAcesso: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("empresas_clientes").add(novaEmpresa);
            
            // Cria as configurações geográficas de forma espelhada para o novo admin conseguir gerenciar a cerca
            const configCheck = await db.collection("configuracoes_empresa").where("empresaEmail", "==", email).get();
            if(configCheck.empty) {
                await db.collection("configuracoes_empresa").add({
                    empresaEmail: email,
                    nomeEmpresa: nome,
                    cep: "", numero: "", latitude: "", longitude: "", raio: "50", endereco: ""
                });
            }

            document.getElementById("formCadastroEmpresa").reset();
            document.getElementById("empSenha").value = "mudar123";
            
            alert("✅ Administrador registrado e associado à empresa com sucesso!");
            await carregarEmpresasDaNuvem();

        } catch (error) {
            alert("⚠️ Falha ao salvar no banco de dados.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Salvar Registro na Nuvem";
        }
    }

    // FUNÇÃO MANTIDA: Permite alterar a senha editando diretamente o input na tabela
    async function atualizarSenhaDireto(id, novaSenha) {
        if(!novaSenha.trim()) return;
        try {
            await db.collection("empresas_clientes").doc(id).update({ senhaAtual: novaSenha.trim() });
            alert("🔑 Senha atualizada na nuvem com sucesso!");
        } catch (error) {
            alert("Erro ao atualizar senha.");
        }
    }

    // FUNÇÃO MANTIDA: Gera e copia o link de convite do administrador para a área de transferência
    function copiarLinkAcesso(emailAdmin) {
        const link = `https://ponto.ldsite.com.br/login-admin.html?user=${encodeURIComponent(emailAdmin)}`;
        navigator.clipboard.writeText(link).then(() => {
            alert("🔗 Link de acesso copiado com sucesso para este Administrador!");
        }).catch(() => {
            alert("Erro ao copiar link automaticamente. Use: " + link);
        });
    }

    async function alternarStatusEmpresa(id, statusAtual) {
        const novoStatus = statusAtual === "ATIVO" ? "BLOQUEADO" : "ATIVO";
        try {
            await db.collection("empresas_clientes").doc(id).update({ status: novoStatus });
            await carregarEmpresasDaNuvem();
        } catch (error) {
            alert("Erro ao mudar status.");
        }
    }

    async function excluirContaAdmin(id) {
        if(!confirm("Tem certeza que deseja remover esta conta administrativa permanentemente?")) return;
        try {
            await db.collection("empresas_clientes").doc(id).delete();
            await carregarEmpresasDaNuvem();
        } catch (error) {
            alert("Erro ao remover conta.");
        }
    }

    function efetuarLogoutMaster() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
