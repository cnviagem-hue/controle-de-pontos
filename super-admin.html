<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Controle - Super Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020617; font-family: 'Segoe UI', Arial, sans-serif; color: #ffffff; min-height: 100vh; }
        .sidebar { background-color: #0f172a; min-height: 100vh; padding: 24px; border-right: 1px solid #1e293b; }
        .sidebar h4 { color: #10b981; font-weight: 800; letter-spacing: -0.5px; }
        .card-custom { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 24px; }
        .form-control, .form-select { background-color: #1e293b; border: 1px solid #334155; color: #ffffff; padding: 10px 14px; }
        .form-control:focus, .form-select:focus { background-color: #1e293b; color: #ffffff; border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn-custom { background-color: #10b981; color: #ffffff; font-weight: 700; border: none; padding: 10px 20px; border-radius: 8px; transition: all 0.2s; }
        .btn-custom:hover { background-color: #059669; }
        .table-custom { color: #ffffff; }
        .table-custom th { background-color: #1e293b; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; }
        .table-custom td { border-bottom: 1px solid #1e293b; padding: 14px 8px; vertical-align: middle; }
        .badge-ativo { background-color: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-bloqueado { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <h4>Ponto<span>Web</span></h4>
            <p class="text-muted small">Master Control</p>
            <hr class="text-secondary">
            <ul class="nav flex-column gap-2 mt-4">
                <li class="nav-item"><a class="nav-link text-white fw-bold p-2 bg-secondary rounded" href="#">🏢 Empresas Clientes</a></li>
                <li class="nav-item"><a class="nav-link text-muted p-2" href="#" onclick="efetuarLogoutMaster()">◀ Sair do Sistema</a></li>
            </ul>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold fs-3">Gestão de Empresas Parceiras</h2>
                <span class="badge bg-success text-white px-3 py-2 fw-bold">Nuvem Sincronizada</span>
            </div>

            <div class="card-custom mb-4">
                <h5 class="fw-bold mb-3 text-white">➕ Registrar Empresa / Novo Administrador</h5>
                <form id="formCadastroEmpresa" onsubmit="cadastrarNovaEmpresa(event)">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Nome Fantasia da Empresa</label>
                            <input type="text" id="empNome" class="form-control" placeholder="Ex: Caldas Novas Viagens" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">CNPJ</label>
                            <input type="text" id="empCnpj" class="form-control" placeholder="Apenas números ou com máscara" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">E-mail do Administrador (RH)</label>
                            <input type="email" id="empEmail" class="form-control" placeholder="rh@empresa.com" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small text-muted mb-1">Senha Provisória de Acesso</label>
                            <input type="text" id="empSenha" class="form-control" value="mudar123" required>
                        </div>
                    </div>
                    <div class="mt-3 text-end">
                        <button type="submit" id="btnSalvarEmpresa" class="btn-custom">Salvar Registro na Nuvem</button>
                    </div>
                </form>
            </div>

            <div class="card-custom">
                <h5 class="fw-bold mb-3 text-white">📋 Contas Administrativas Ativas</h5>
                <div class="table-responsive">
                    <table class="table table-custom menu-table">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>CNPJ</th>
                                <th>E-mail do Admin</th>
                                <th>Senha Atual</th>
                                <th>Status</th>
                                <th class="text-center">Ações de Controle</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEmpresasCorpo">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-3">⏳ Carregando base de dados...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAY8VH8f3SKpDvKdm0fzG-9X7gAm-yUEF4",
      authDomain: "ld-controle-de-ponto.firebaseapp.com",
      projectId: "ld-controle-de-ponto",
      storageBucket: "ld-controle-de-ponto.firebasestorage.app",
      messagingSenderId: "825252476177",
      appId: "1:825252476177:web:042610ab02abe5e964c8b0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.addEventListener("DOMContentLoaded", () => {
        if (!sessionStorage.getItem("super_admin_autenticado")) {
            window.location.href = "index.html";
            return;
        }
        carregarEmpresasDaNuvem();
    });

    async function carregarEmpresasDaNuvem() {
        const corpo = document.getElementById("tabelaEmpresasCorpo");
        try {
            const snapshot = await db.collection("empresas_clientes").get();
            corpo.innerHTML = "";

            if(snapshot.empty) {
                corpo.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">Nenhuma empresa registrada.</td></tr>`;
                return;
            }

            snapshot.forEach(doc => {
                const emp = doc.data();
                const badge = emp.status === "ATIVO" ? "badge-ativo" : "badge-bloqueado";
                const txtBotao = emp.status === "ATIVO" ? "Bloquear" : "Ativar";
                const classeBotao = emp.status === "ATIVO" ? "btn-outline-danger" : "btn-outline-success";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="fw-bold">${emp.nome}</td>
                    <td>${emp.cnpj}</td>
                    <td class="text-info">${emp.email}</td>
                    <td><code class="text-white bg-dark px-2 py-1 rounded">${emp.senhaAtual}</code></td>
                    <td><span class="badge ${badge}">${emp.status}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm ${classeBotao} me-2" onclick="alternarStatusEmpresa('${doc.id}', '${emp.status}')">${txtBotao}</button>
                        <button class="btn btn-sm btn-danger" onclick="excluirContaAdmin('${doc.id}')">Eliminar</button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        } catch (error) {
            corpo.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Erro ao ler dados da nuvem.</td></tr>`;
        }
    }

    // EVOLUÇÃO DA FUNÇÃO: Agora valida duplicidade por E-MAIL e não por CNPJ, liberando múltiplos admins!
    async function cadastrarNovaEmpresa(event) {
        event.preventDefault();
        const btn = document.getElementById("btnSalvarEmpresa");
        
        const nome = document.getElementById("empNome").value.trim();
        const cnpj = document.getElementById("empCnpj").value.trim();
        const email = document.getElementById("empEmail").value.trim().toLowerCase();
        const senha = document.getElementById("empSenha").value.trim();

        btn.disabled = true;
        btn.innerHTML = "⏳ Gravando na Nuvem...";

        try {
            // Verifica se o e-mail específico já está cadastrado em alguma conta
            const checkEmail = await db.collection("empresas_clientes").where("email", "==", email).get();
            
            if (!checkEmail.empty) {
                alert("❌ Erro de Duplicidade:\n\nEste e-mail de Administrador já está cadastrado no sistema!");
                btn.disabled = false;
                btn.innerHTML = "Salvar Registro na Nuvem";
                return;
            }

            const novaEmpresa = {
                nome: nome,
                cnpj: cnpj,
                email: email,
                senhaAtual: senha,
                status: "ATIVO",
                primeiroAcesso: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("empresas_clientes").add(novaEmpresa);
            
            // Cria um espelho automático na coleção de configurações caso seja o primeiro admin da empresa
            const configCheck = await db.collection("configuracoes_empresa").where("empresaEmail", "==", email).get();
            if(configCheck.empty) {
                await db.collection("configuracoes_empresa").add({
                    empresaEmail: email,
                    nomeEmpresa: nome,
                    cep: "", numero: "", latitude: "", longitude: "", raio: "50", endereco: ""
                });
            }

            document.getElementById("formCadastroEmpresa").reset();
            document.getElementById("empSenha").value = "mudar123";
            
            alert("✅ Sucesso!\n\nConta administrativa vinculada à empresa com sucesso!");
            await carregarEmpresasDaNuvem();

        } catch (error) {
            console.error(error);
            alert("⚠️ Falha ao salvar no banco de dados.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Salvar Registro na Nuvem";
        }
    }

    async function alternarStatusEmpresa(id, statusAtual) {
        const novoStatus = statusAtual === "ATIVO" ? "BLOQUEADO" : "ATIVO";
        try {
            await db.collection("empresas_clientes").doc(id).update({ status: novoStatus });
            await carregarEmpresasDaNuvem();
        } catch (error) {
            alert("Erro ao mudar status.");
        }
    }

    async function excluirContaAdmin(id) {
        if(!confirm("Tem certeza que deseja remover esta conta administrativa permanentemente?")) return;
        try {
            await db.collection("empresas_clientes").doc(id).delete();
            await carregarEmpresasDaNuvem();
        } catch (error) {
            alert("Erro ao remover conta.");
        }
    }

    function efetuarLogoutMaster() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
